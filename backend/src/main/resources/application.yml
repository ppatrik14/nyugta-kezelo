spring:
  application:
    name: nyugta-kezelo

  datasource:
    url: jdbc:h2:mem:receiptdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

# Számlázz.hu konfiguráció - environment változókból
szamlazz:
  agent-key: ${SZAMLAZZ_AGENT_KEY:}
  pdf-download: ${SZAMLAZZ_PDF_DOWNLOAD:false}
  api-url: https://www.szamlazz.hu/szamla/
  timeout-ms: 30000

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
